<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>K·FISH 시안 생성기</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/template.css">
    <script src="node_modules/html2canvas/dist/html2canvas.min.js"></script>
</head>
<body>
<div class="layout">

    <!-- ===== 좌측: 편집 영역 ===== -->
    <main class="editor">

        <!-- 상단 툴바 -->
        <div class="editor-toolbar">
            <div class="toolbar-left">
                <h1 class="editor-title">K·FISH 시안 생성기</h1>
                <div class="toolbar-tabs">
                    <button class="toolbar-tab active" data-tab="editor" onclick="App.switchTab('editor')">입력</button>
                    <button class="toolbar-tab" data-tab="preview" onclick="App.switchTab('preview')">미리보기</button>
                </div>
            </div>
            <div class="toolbar-actions">
                <span class="save-status" id="save-status">저장 대기</span>
                <button class="tbtn tbtn--save" onclick="App.saveProject()">저장</button>
                <button class="tbtn tbtn--img" onclick="App.downloadImage()">이미지 다운로드</button>
                <a class="tbtn tbtn--backup" href="/api/backup">DB 백업</a>
            </div>
        </div>

        <!-- 편집 폼 스크롤 영역 -->
        <div class="editor-panel active" id="panel-editor">

        <!-- 섹션 트래커 -->
        <div class="section-tracker" id="section-tracker">
            <div class="tracker-item active" data-target="sec-basic" onclick="App.scrollTo('sec-basic')">기본정보</div>
            <div class="tracker-item" data-target="sec-sections" onclick="App.scrollTo('sec-sections')">반복섹션</div>
            <div class="tracker-item" data-target="sec-products" onclick="App.scrollTo('sec-products')">승인상품</div>
            <div class="tracker-item" data-target="sec-certs" onclick="App.scrollTo('sec-certs')">인증서</div>
        </div>

        <div class="editor-scroll" id="editor-scroll">

            <!-- 언어 선택 (탭 스타일) -->
            <div class="lang-bar" id="sec-basic">
                <span class="lang-bar-label">언어</span>
                <div class="lang-tabs">
                    <label class="lang-tab active"><input type="radio" name="lang" value="ko" checked hidden> 한국어</label>
                    <label class="lang-tab"><input type="radio" name="lang" value="en" hidden> English</label>
                    <label class="lang-tab"><input type="radio" name="lang" value="cn" hidden> 中文</label>
                    <label class="lang-tab"><input type="radio" name="lang" value="jp" hidden> 日本語</label>
                </div>
                <div class="lang-actions">
                    <label class="translate-empty-only"><input type="checkbox" id="translate-empty-only" checked> 빈칸만</label>
                    <span class="translate-estimate" id="translate-estimate">예상 0자</span>
                    <button type="button" class="lang-translate-btn" id="btn-translate-current" onclick="App.translateCurrentFromKorean()">한국어 기준 번역</button>
                    <span class="deepl-usage" id="deepl-usage">DeepL 사용량 확인 중</span>
                </div>
            </div>

            <!-- 업체 기본 정보 -->
            <div class="form-section">
                <h2>업체 기본 정보</h2>
                <div class="form-row">
                    <label>업체명</label>
                    <input type="text" id="inp-company-name" placeholder="예: 라온바다">
                </div>
                <div class="form-row">
                    <label>업체 소개</label>
                    <textarea id="inp-company-intro" rows="3" placeholder="업체 소개 문구를 입력하세요"></textarea>
                </div>
                <div class="form-row">
                    <label>업체 대표 이미지</label>
                    <input type="file" accept="image/*" data-target="inp-main-image">
                    <div class="img-thumb" id="inp-main-image"></div>
                </div>
            </div>

            <!-- 반복 섹션 -->
            <div class="form-section" id="sec-sections">
                <h2>반복 섹션 <button class="btn btn--add" onclick="App.addSection()">+ 섹션 추가</button></h2>
                <div id="sections-container"></div>
            </div>

            <!-- 승인상품 -->
            <div class="form-section" id="sec-products">
                <h2>승인상품 <button class="btn btn--add" onclick="App.addProduct()">+ 상품 추가</button></h2>
                <div id="products-container"></div>
            </div>

            <!-- 인증서 -->
            <div class="form-section" id="sec-certs">
                <h2>품질인증서 <button class="btn btn--add" onclick="App.addCert()">+ 인증서 추가</button></h2>
                <div id="certs-container"></div>
            </div>

        </div>
        </div>

        <!-- 미리보기 패널 -->
        <div class="editor-panel" id="panel-preview">
            <div class="preview-scroll">
                <div class="preview-wrap">
                    <div id="preview-area"></div>
                </div>
            </div>
        </div>

    </main>

    <!-- ===== 우측: 사이드바 (프로젝트 목록) ===== -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>프로젝트</h2>
            <button class="btn btn--add" onclick="App.newProject()">+ 새 프로젝트</button>
        </div>
        <div class="sidebar-search">
            <input type="text" id="project-search" placeholder="업체명 검색..." oninput="App.filterProjects(this.value)">
        </div>
        <div class="sidebar-status" id="project-current"></div>
        <div class="sidebar-list" id="project-list"></div>
    </aside>

</div>

<div class="modal-backdrop" id="download-modal" hidden>
    <div class="modal-card modal-card--download" role="dialog" aria-modal="true" aria-labelledby="download-modal-title">
        <div class="modal-head">
            <div>
                <h2 id="download-modal-title">이미지 다운로드 옵션</h2>
                <p>압축률을 선택한 뒤 JPG로 추출합니다.</p>
            </div>
            <button class="modal-close" type="button" id="download-modal-close" aria-label="닫기">✕</button>
        </div>
        <div class="download-quality-list">
            <label class="download-quality-option">
                <input type="radio" name="download-quality" value="low">
                <span class="download-quality-copy">
                    <strong>저용량</strong>
                    <small>용량 작음, 품질 55%</small>
                </span>
            </label>
            <label class="download-quality-option active">
                <input type="radio" name="download-quality" value="medium" checked>
                <span class="download-quality-copy">
                    <strong>기본</strong>
                    <small>권장, 품질 75%</small>
                </span>
            </label>
            <label class="download-quality-option">
                <input type="radio" name="download-quality" value="high">
                <span class="download-quality-copy">
                    <strong>고화질</strong>
                    <small>용량 큼, 품질 92%</small>
                </span>
            </label>
        </div>
        <div class="modal-actions">
            <button class="btn btn--ghost" type="button" id="download-modal-cancel">취소</button>
            <button class="tbtn tbtn--img" type="button" id="download-modal-confirm">다운로드</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/api.js?v=20260416-fix3"></script>
<script src="js/app.js?v=20260416-fix3"></script>
</body>
</html>
